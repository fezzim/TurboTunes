<body>
   

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, Helvetica, sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.7)),
  url('https://images.unsplash.com/photo-1503376780353-7e6692767b70');
  background-size:cover;
  background-position:center;
}

.container{
  width:350px;
  background:white;
  padding:30px;
  border-radius:10px;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
  text-align:center;
}

.container h2{
  margin-bottom:20px;
}

.input-group{
  margin-bottom:15px;
  text-align:left;
}

.input-group label{
  font-weight:bold;
  font-size:14px;
}

.input-group input{
  width:100%;
  padding:10px;
  margin-top:5px;
  border-radius:5px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:12px;
  border:none;
  background:#111;
  color:white;
  font-size:16px;
  border-radius:6px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#e63946;
}

.car-gallery{
  margin-top:20px;
  display:flex;
  justify-content:space-between;
}

.car-gallery img{
  width:70px;
  height:45px;
  object-fit:cover;
  border-radius:5px;
}

.message{
  margin-top:10px;
  font-size:14px;
}
</style>
</head>
<body>

<div class="container">
<h2>Car Shop Login</h2>

<form id="loginForm">

<div class="input-group">
<label>Email or Phone</label>
<input type="text" id="email or phone" required>
</div>

<div class="input-group">
<label>Password</label>
<input type="password" id="password" required>
</div>

<button type="submit">Sign In</button>

</form>

<p class="message" id="message"></p>

<div class="car-gallery">
<img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70">
<img src="https://images.unsplash.com/photo-1511919884226-fd3cad34687c">
<img src="https://images.unsplash.com/photo-1493238792000-8113da705763">
</div>

</div>

<script>
const form = document.getElementById('loginForm');
const message = document.getElementById('message');

form.addEventListener('submit', function(e){
  e.preventDefault();

  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  if(email === "admin@carshop.com" && password === "1234"){
    message.style.color = "green";
    message.textContent = "Login successful! Welcome to the Car Shop.";
  }else{
    message.style.color = "red";
    message.textContent = "Invalid email or password.";
  }
});
</script>

</body>
